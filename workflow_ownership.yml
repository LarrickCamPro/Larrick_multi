version: 1
promotion_target: main
repo:
  owner: mhold3n
  name: Larrick_multi
pr_policy:
  auto_merge_to_dev: true
  manual_merge_to_main: true
issue_policy: optional
routing_policy:
  confidence_threshold: 0.70
  confidence_gap_threshold: 0.15
  prompt_excerpt_chars: 240
  explicit_token_prefix: "workflow:"
  explicit_phrase_templates:
    - "working on {workflow} development"
    - "this conversation is for {workflow} development"
    - "developing {workflow}"
  main_keywords:
    - architecture
    - branch ownership
    - codeowners
    - governance
    - workflow ownership
    - concierge
    - automation
    - ci
    - docs
    - repo layout
merge_checker_policy:
  inactivity_hours: 72
  blocked_archive_hours: 336
audit_thresholds:
  stale_branch_without_pr_hours: 24
  stale_open_task_pr_hours: 48
  stale_failing_task_pr_hours: 24
  orphaned_no_pr_archive_hours: 336
release_policy:
  strategy: semver
  tag_prefix: v
  current_version_source: pyproject.toml
shared_contract_paths:
  - src/larrak2/architecture/**
main_only_paths:
  - src/larrak2/architecture/**
  - .github/CODEOWNERS
  - .github/workflows/ci.yml
  - .github/workflows/layout.yml
  - .github/workflows/reusable-fast.yml
  - .github/workflows/ci-telemetry.yml
  - .github/workflows/ownership.yml
  - .github/concierge_templates/**
  - .gitignore
  - AGENTS.md
  - CLAUDE.md
  - README.md
  - .github/copilot-instructions.md
  - Docs/github_admin_hardening_checklist.md
  - repo_layout.yml
  - workflow_ownership.yml
  - scripts/check_branch_ownership.py
  - scripts/check_repo_layout.py
  - scripts/start_parallel_task.sh
  - scripts/finish_parallel_task.sh
  - scripts/plan_github_concierge.py
  - scripts/route_current_thread.py
  - tests/ci/test_agent_docs.py
  - tests/ci/test_branch_ownership.py
  - tests/ci/test_github_concierge_planner.py
  - tests/ci/test_workflow_ci_layout.py
  - tests/ci/test_workflow_contracts.py
workflows:
  simulation:
    base_branch: dev/simulation
    promotion_target: main
    routing_keywords:
      - simulation
      - openfoam
      - solver
      - combustion
      - cantera
      - chemistry
      - spray
      - doe
      - runtime chemistry
      - validation suite
    owned_paths:
      - src/larrak2/simulation_validation/**
      - src/larrak2/pipelines/openfoam.py
      - src/larrak2/adapters/openfoam.py
      - src/larrak2/adapters/docker_openfoam.py
      - openfoam_custom_solvers/**
      - openfoam_templates/**
      - mechanisms/openfoam/**
      - .github/workflows/simulation.yml
      - tests/ci/test_docker_openfoam.py
      - tests/ci/test_gas_combustion_truth_suite.py
      - tests/ci/test_openfoam*.py
      - tests/ci/test_runtime_chemistry_table.py
      - tests/ci/test_simulation_validation*.py
      - tests/ci/test_validate_simulation_cli_cache.py
  training:
    base_branch: dev/training
    promotion_target: main
    routing_keywords:
      - training
      - surrogate
      - model training
      - manifest
      - dataset bundle
      - hifi
      - train
      - quality contract
      - neural network
    owned_paths:
      - src/larrak2/training/**
      - src/larrak2/surrogate/**
      - src/larrak2/cli/train.py
      - .github/workflows/training.yml
      - tests/ci/test_hifi_surrogate_adapter_strict.py
      - tests/ci/test_overnight_f2_campaign.py
      - tests/ci/test_surrogate*.py
      - tests/ci/test_train*.py
      - tests/ci/test_training_quality_report_emission.py
  optimization:
    base_branch: dev/optimization
    promotion_target: main
    routing_keywords:
      - optimization
      - optimizer
      - pareto
      - pymoo
      - trust region
      - explore exploit
      - promotion
      - orchestration budget
      - refine pareto
    owned_paths:
      - src/larrak2/optimization/**
      - src/larrak2/promote/**
      - src/larrak2/cli/run.py
      - src/larrak2/cli/run_workflows.py
      - src/larrak2/orchestration/simulation_inputs.py
      - .github/workflows/optimization.yml
      - tests/ci/test_explore_exploit*.py
      - tests/ci/test_orchestrate*.py
      - tests/ci/test_orchestration_budget.py
      - tests/ci/test_orchestration_cache.py
      - tests/ci/test_orchestration_trust_region.py
      - tests/ci/test_pareto*.py
      - tests/ci/test_production_gate.py
      - tests/ci/test_promotion.py
      - tests/ci/test_pymoo_problem_fault_isolation.py
      - tests/ci/test_refine_pareto*.py
      - tests/ci/test_slice_active_set.py
  analysis:
    base_branch: dev/analysis
    promotion_target: main
    routing_keywords:
      - analysis
      - telemetry
      - report
      - reporting
      - metrics
      - readiness
      - summary
    owned_paths:
      - src/larrak2/analysis/**
      - .github/workflows/analysis.yml
      - tests/ci/test_telemetry*.py
  cem-orchestration:
    base_branch: dev/cem-orchestration
    promotion_target: main
    routing_keywords:
      - cem
      - realworld
      - real world
      - tribology
      - lubrication
      - scuff
      - micropitting
      - orchestration backend
      - material
      - life damage
    owned_paths:
      - src/larrak2/cem/**
      - src/larrak2/realworld/**
      - src/larrak2/orchestration/**
      - src/larrak2/optimization/production_gate.py
      - src/larrak2/optimization/workflow_report.py
      - .github/workflows/cem-orchestration.yml
      - tests/ci/test_cem_modules.py
      - tests/ci/test_life_damage_calibration.py
      - tests/ci/test_lifetime_scalar_fallback.py
      - tests/ci/test_material_snapping.py
      - tests/ci/test_orchestration_adapters_smoke.py
      - tests/ci/test_orchestration_optional_backends.py
      - tests/ci/test_realworld*.py
      - tests/ci/test_simulation_input_providers.py
    exclude_paths:
      - src/larrak2/orchestration/simulation_inputs.py
