name: CI

on:
  push:
    branches:
      - main
      - "codex/main/**"
    paths:
      - ".github/CODEOWNERS"
      - ".github/concierge_templates/**"
      - ".github/copilot-instructions.md"
      - ".github/workflows/ci.yml"
      - ".github/workflows/ci-telemetry.yml"
      - ".github/workflows/layout.yml"
      - ".github/workflows/ownership.yml"
      - ".github/workflows/reusable-fast.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "Docs/github_admin_hardening_checklist.md"
      - "README.md"
      - "repo_layout.yml"
      - "workflow_ownership.yml"
      - "scripts/check_branch_ownership.py"
      - "scripts/plan_github_concierge.py"
      - "scripts/check_repo_layout.py"
      - "scripts/start_parallel_task.sh"
      - "scripts/finish_parallel_task.sh"
      - "src/larrak2/architecture/**"
      - "tests/ci/test_agent_docs.py"
      - "tests/ci/test_branch_ownership.py"
      - "tests/ci/test_github_concierge_planner.py"
      - "tests/ci/test_workflow_ci_layout.py"
      - "tests/ci/test_workflow_contracts.py"
  pull_request:
    branches: [main]
    paths:
      - ".github/CODEOWNERS"
      - ".github/concierge_templates/**"
      - ".github/copilot-instructions.md"
      - ".github/workflows/ci.yml"
      - ".github/workflows/ci-telemetry.yml"
      - ".github/workflows/layout.yml"
      - ".github/workflows/ownership.yml"
      - ".github/workflows/reusable-fast.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "Docs/github_admin_hardening_checklist.md"
      - "README.md"
      - "repo_layout.yml"
      - "workflow_ownership.yml"
      - "scripts/check_branch_ownership.py"
      - "scripts/plan_github_concierge.py"
      - "scripts/check_repo_layout.py"
      - "scripts/start_parallel_task.sh"
      - "scripts/finish_parallel_task.sh"
      - "src/larrak2/architecture/**"
      - "tests/ci/test_agent_docs.py"
      - "tests/ci/test_branch_ownership.py"
      - "tests/ci/test_github_concierge_planner.py"
      - "tests/ci/test_workflow_ci_layout.py"
      - "tests/ci/test_workflow_contracts.py"

permissions:
  contents: read

jobs:
  fast:
    uses: ./.github/workflows/reusable-fast.yml
    with:
      workflow_name: main
      pytest_args: "pytest -q tests/ci/test_agent_docs.py tests/ci/test_branch_ownership.py tests/ci/test_github_concierge_planner.py tests/ci/test_workflow_ci_layout.py tests/ci/test_workflow_contracts.py"
      mypy_paths: "src/larrak2/architecture/github_concierge.py src/larrak2/architecture/workflow_contracts.py scripts/check_branch_ownership.py scripts/check_repo_layout.py scripts/plan_github_concierge.py"
      ruff_paths: "src/larrak2/architecture scripts/check_branch_ownership.py scripts/check_repo_layout.py scripts/plan_github_concierge.py tests/ci/test_agent_docs.py tests/ci/test_branch_ownership.py tests/ci/test_github_concierge_planner.py tests/ci/test_workflow_ci_layout.py tests/ci/test_workflow_contracts.py"
