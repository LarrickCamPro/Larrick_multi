name: CI

on:
  push:
  pull_request:

permissions:
  contents: read


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q

  casadi:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (CasADi lane)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,casadi]"
      - name: Run CasADi architecture tests
        env:
          PYTHONPATH: src
        run: |
          pytest -q \
            tests/ci/test_symbolic_mlp_export.py \
            tests/ci/test_symbolic_slice_nlp_nonlinear.py \
            tests/ci/test_refine_pareto_backend_fallback.py \
            tests/ci/test_orchestration_adapters_smoke.py
