name: Branch Ownership

on:
  pull_request:
    branches:
      - main
      - "dev/**"
  push:
    branches:
      - main
      - "dev/**"
      - "codex/**"

permissions:
  contents: read

jobs:
  ownership:
    name: Branch Ownership
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ownership checker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Compute changed files
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git fetch origin "$GITHUB_BASE_REF" --depth=1
            git diff --name-only "origin/$GITHUB_BASE_REF...HEAD" > /tmp/changed.txt
          elif [[ -n "${GITHUB_EVENT_BEFORE:-}" && "${GITHUB_EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "$GITHUB_EVENT_BEFORE" "$GITHUB_SHA" > /tmp/changed.txt
          else
            git ls-files > /tmp/changed.txt
          fi
      - name: Validate branch ownership
        run: |
          branch_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            python scripts/check_branch_ownership.py --branch "$branch_name" --base "$GITHUB_BASE_REF" --changed-file /tmp/changed.txt
          else
            python scripts/check_branch_ownership.py --branch "$branch_name" --changed-file /tmp/changed.txt
          fi
