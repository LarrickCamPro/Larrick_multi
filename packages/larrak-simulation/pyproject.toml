[project]
name = "larrak-simulation"
version = "0.1.0"
description = "Standalone simulation package for Larrak OpenFOAM/validation workflows"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "scikit-learn>=1.0",
]

[project.optional-dependencies]
combustion = ["cantera>=3.0"]

[project.scripts]
larrak-sim = "larrak_simulation.cli.validate_simulation:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "../../larrak-simulation/src"

[tool.setuptools.packages.find]
where = ["../../larrak-simulation/src"]
include = ["larrak_simulation*"]

