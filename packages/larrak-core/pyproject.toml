[project]
name = "larrak-core"
version = "0.1.0"
description = "Vendored wrapper for the larrak-core submodule"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "joblib>=1.3",
    "numpy>=1.24",
    "numpy-stl>=3.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "scikit-learn>=1.0",
    "torch>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "ruff>=0.1", "mypy>=1.0"]
casadi = ["casadi>=3.6"]
combustion = ["cantera>=3.0"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "../../larrak-core/src"

[tool.setuptools.packages.find]
where = ["../../larrak-core/src"]
include = ["larrak_runtime*", "larrak2.architecture*"]

